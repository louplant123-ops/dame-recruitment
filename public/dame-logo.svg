<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" role="img" aria-labelledby="title">
  <title id="title">Dame Recruitment</title>
  <defs>
    <linearGradient id="brandLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2B9FC6"/>
      <stop offset=".34" stop-color="#2F4ED1"/>
      <stop offset=".68" stop-color="#6B4ED0"/>
      <stop offset="1" stop-color="#C54B65"/>
    </linearGradient>
  </defs>

  <!-- Monogram badge -->
  <rect x="6" y="6" width="128" height="128" rx="22" fill="#14181d"/>
  <rect x="6" y="6" width="128" height="128" rx="22" fill="none" stroke="url(#brandLine)" stroke-width="2.5" opacity=".9"/>
  <text x="70" y="106" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="600"
        font-size="100" fill="#f1ecdf" letter-spacing="-2">D</text>

  <!-- Wordmark -->
  <text x="170" y="86"
        font-family="Georgia, 'Times New Roman', serif" font-weight="600"
        font-size="68" fill="#14181d" letter-spacing="-2">Dame</text>
  <text x="362" y="86"
        font-family="Georgia, 'Times New Roman', serif" font-weight="500"
        font-size="68" fill="#6e7682" letter-spacing="-2">Recruitment</text>

  <!-- Gradient hairline accent -->
  <rect x="170" y="104" width="220" height="2.5" rx="1.25" fill="url(#brandLine)" opacity=".9"/>
</svg>
