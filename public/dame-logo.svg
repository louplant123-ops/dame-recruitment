<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 140" role="img" aria-labelledby="title">
  <title id="title">Dame Recruitment</title>
  <defs>
    <linearGradient id="brandBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset=".28" stop-color="#2563FF"/>
      <stop offset=".55" stop-color="#7C3AED"/>
      <stop offset=".78" stop-color="#D946EF"/>
      <stop offset="1" stop-color="#FF4D6D"/>
    </linearGradient>
    <linearGradient id="brandLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset=".34" stop-color="#2563FF"/>
      <stop offset=".68" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FF4D6D"/>
    </linearGradient>
    <linearGradient id="letterMetal" x1=".25" y1="0" x2=".75" y2="1">
      <stop offset="0" stop-color="#f6f3ea"/>
      <stop offset=".55" stop-color="#c2c5cc"/>
      <stop offset="1" stop-color="#7c828c"/>
    </linearGradient>
    <filter id="badgeGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing gradient border -->
  <rect x="6" y="6" width="128" height="128" rx="22"
        fill="none" stroke="url(#brandBorder)" stroke-width="4"
        filter="url(#badgeGlow)" opacity=".95"/>

  <!-- Solid dark badge -->
  <rect x="9" y="9" width="122" height="122" rx="20" fill="#0b0e13"/>

  <!-- Metallic D -->
  <text x="70" y="106" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="600"
        font-size="100" fill="url(#letterMetal)">D</text>

  <!-- Wordmark -->
  <text x="170" y="88"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="60">
    <tspan font-weight="600" fill="#14181d">Dame</tspan><tspan font-weight="500" fill="#6e7682" dx="6">Recruitment</tspan>
  </text>

  <!-- Gradient hairline accent -->
  <rect x="170" y="104" width="530" height="2" rx="1" fill="url(#brandLine)" opacity=".9"/>
</svg>
