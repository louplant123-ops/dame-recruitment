<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 164" role="img" aria-labelledby="title desc">
  <title id="title">Dame Recruitment</title>
  <desc id="desc">Dame Recruitment wordmark with monogram and tagline People. Performance. Partnership.</desc>
  <defs>
    <linearGradient id="brandLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2B9FC6"/>
      <stop offset=".34" stop-color="#2F4ED1"/>
      <stop offset=".68" stop-color="#6B4ED0"/>
      <stop offset="1" stop-color="#C54B65"/>
    </linearGradient>
  </defs>
  <!-- Monogram badge -->
  <rect x="10" y="12" width="132" height="132" rx="22" fill="#14181d"/>
  <rect x="10" y="12" width="132" height="132" rx="22" fill="none" stroke="url(#brandLine)" stroke-width="2" opacity=".85"/>
  <text x="76" y="112" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="600"
        font-size="100" fill="#f1ecdf" letter-spacing="-2">D</text>
  <!-- Wordmark -->
  <text x="180" y="80"
        font-family="Georgia, 'Times New Roman', serif" font-weight="600"
        font-size="56" fill="#14181d" letter-spacing="-1.5">Dame</text>
  <text x="338" y="80"
        font-family="Georgia, 'Times New Roman', serif" font-weight="500"
        font-size="56" fill="#6e7682" letter-spacing="-1.5">Recruitment</text>
  <!-- Gradient hairline -->
  <rect x="180" y="98" width="382" height="2" rx="1" fill="url(#brandLine)" opacity=".85"/>
  <!-- Tagline -->
  <text x="180" y="128"
        font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600"
        fill="#6e7682" letter-spacing="6">PEOPLE. PERFORMANCE. PARTNERSHIP.</text>
</svg>
