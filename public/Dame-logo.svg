  <text x="352" y="77" fill="#9CA3AF" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="600" letter-spacing="-.8">Recruitment</text>
  <rect x="184" y="96" width="392" height="3" rx="1.5" fill="url(#accent)"/>
