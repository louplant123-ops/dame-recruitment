  <text x="300" y="126" fill="#A78BFA" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="7">PERFORMANCE.</text>
  <text x="489" y="126" fill="#FDA4AF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="7">PARTNERSHIP.</text>
</svg>
