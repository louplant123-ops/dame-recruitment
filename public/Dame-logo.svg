<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 164" role="img" aria-labelledby="title desc">
  <title id="title">Dame Recruitment</title>
  <desc id="desc">Dame Recruitment wordmark with monogram and the tagline People. Performance. Partnership.</desc>
  <defs>
    <linearGradient id="brandBorder" x1="10" y1="12" x2="142" y2="144" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset=".35" stop-color="#2563FF"/>
      <stop offset=".7" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FF4D6D"/>
    </linearGradient>
    <linearGradient id="letterMetal" x1="55" y1="33" x2="105" y2="126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset=".25" stop-color="#9CA3AF"/>
      <stop offset=".52" stop-color="#F3F4F6"/>
      <stop offset=".82" stop-color="#4B5563"/>
      <stop offset="1" stop-color="#E5E7EB"/>
    </linearGradient>
    <radialGradient id="iconSurface" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(49 30) rotate(54) scale(144)">
      <stop stop-color="#1F2937"/>
      <stop offset=".5" stop-color="#0A0F1A"/>
      <stop offset="1" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="accent" x1="188" y1="104" x2="576" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset=".34" stop-color="#2563FF"/>
      <stop offset=".68" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FF4D6D"/>
    </linearGradient>
  </defs>
  <rect x="10" y="12" width="132" height="132" rx="30" fill="url(#iconSurface)" stroke="url(#brandBorder)" stroke-width="3"/>
  <rect x="20" y="22" width="112" height="112" rx="23" fill="none" stroke="#fff" stroke-opacity=".08"/>
