<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset=".28" stop-color="#2563FF"/>
      <stop offset=".55" stop-color="#7C3AED"/>
      <stop offset=".78" stop-color="#D946EF"/>
      <stop offset="1" stop-color="#FF4D6D"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="letter" x1=".25" y1="0" x2=".75" y2="1">
      <stop offset="0" stop-color="#f6f3ea"/>
      <stop offset="1" stop-color="#a3a8b1"/>
    </linearGradient>
  </defs>

  <!-- Outer glow border -->
  <rect x="3" y="3" width="58" height="58" rx="13"
        fill="none" stroke="url(#border)" stroke-width="3.5"
        filter="url(#glow)" opacity=".9"/>

  <!-- Crisp inner dark badge -->
  <rect x="4.5" y="4.5" width="55" height="55" rx="11.5" fill="#0b0e13"/>

  <!-- Subtle inner sheen -->
  <rect x="4.5" y="4.5" width="55" height="55" rx="11.5"
        fill="url(#letter)" opacity=".04"/>

  <!-- D monogram -->
  <text x="32" y="49"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="600"
        font-size="46"
        fill="url(#letter)">D</text>
</svg>
