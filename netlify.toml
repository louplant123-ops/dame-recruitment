[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Assignment schedule function (highest priority)
[[redirects]]
  from = "/assignment-schedule*"
  to = "/.netlify/functions/assignment-page"
  status = 200
  force = true

# Handle Next.js static export with trailing slashes  
[[redirects]]
  from = "/register"
  to = "/register/"
  status = 301

[[redirects]]
  from = "/part2registration"
  to = "/part2registration/"
  status = 301

# Do NOT add a 301 from /jobs/:slug → /jobs/:slug/ here — it can cause an
# ERR_TOO_MANY_REDIRECTS loop with Netlify’s own trailing-slash handling. Use
# trailing slashes in <Link href> (Next trailingSlash: true) instead.

# New vacancies added after the last build have no out/jobs/<slug>/ yet. Without
# this rewrite, /* → index.html shows the homepage. Netlify shadowing: if a file
# exists at out/jobs/<slug>/index.html, this rule does not run.
[[redirects]]
  from = "/jobs/*"
  to = "/jobs/loader/index.html"
  status = 200

# Fallback for SPA routing (lowest priority)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.netlify.app https://*.railway.app https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com;"
