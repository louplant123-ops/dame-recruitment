[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Assignment schedule function (highest priority)
[[redirects]]
  from = "/assignment-schedule*"
  to = "/.netlify/functions/assignment-page"
  status = 200
  force = true

# Handle Next.js static export with trailing slashes  
[[redirects]]
  from = "/register"
  to = "/register/"
  status = 301

[[redirects]]
  from = "/part2registration"
  to = "/part2registration/"
  status = 301

# NOTE: Do NOT add a blanket redirect for /jobs/* → 404. Netlify does not reliably
# "shadow" that rule with existing static files under out/jobs/<slug>/, so every
# job detail page would 404 even when the HTML was built. Unknown slugs without
# a matching file fall through to the SPA catch-all below (homepage) — rare if
# we rebuild when jobs change; better than a false 404 for valid vacancies.

# Fallback for SPA routing (lowest priority)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
